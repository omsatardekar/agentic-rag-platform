services:
  # Backend FastAPI Service
  - type: web
    name: agentic-rag-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --chdir backend app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard
      - key: MONGO_DB_NAME
        value: rag_ai_platform
      - key: GROQ_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256

  # Frontend React Static Site
  - type: web
    name: agentic-rag-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://${agentic-rag-backend.host}/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
